name: Sync from site repo and wakame config

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *" # 毎時間実行

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout destination repo (this repo)
        uses: actions/checkout@v4
        with:
          # プライベートリポジトリへのプッシュ権限を持つPATを使用
          token: ${{ secrets.PAT }}
          # 歴史をたどれるように取得（競合解決のため）
          fetch-depth: 0

      - name: Checkout source repo (site)
        uses: actions/checkout@v4
        with:
          repository: woolisbest-4520/edu
          path: site
          token: ${{ secrets.PAT }}

      - name: Checkout wakame repo
        uses: actions/checkout@v4
        with:
          repository: siawaseok3/wakame
          path: wakame
          token: ${{ secrets.PAT }}

      - name: Sync selected files with rename
        run: |
          mkdir -p edu

          # site → this repo
          if [ -f site/tube/education/form.txt ]; then
            cp site/tube/education/form.txt edu/edu.txt
          fi
          if [ -f site/tube/education/site.txt ]; then
            cp site/tube/education/site.txt edu/ep.txt
          fi

          # wakame/video_config.json → edu/parameter.txt
          if [ -f wakame/video_config.json ]; then
            jq -r '.params' wakame/video_config.json > edu/parameter.txt
          fi

      - name: Commit & Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          
          # 変更がある場合のみ処理
          if ! git diff --cached --quiet; then
            git commit -m "Sync from site repo and wakame config"
            
            # 重要：リモートの最新状態を取り込んでからプッシュ（競合回避）
            # checkout時にPATを使っているため、ここでも認証が維持されます
            git pull --rebase origin main
            
            git push origin main
          else
            echo "No changes detected. Skipping push."
          fi
