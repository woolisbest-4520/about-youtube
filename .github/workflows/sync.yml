name: Sync from site repo and wakame config

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *" # 毎時間実行

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout destination repo (this repo)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}
          fetch-depth: 0

      - name: Checkout source repo (site)
        uses: actions/checkout@v4
        with:
          repository: woolisbest-4520/site
          path: site_repo
          token: ${{ secrets.PAT }}

      - name: Checkout wakame repo
        uses: actions/checkout@v4
        with:
          repository: siawaseok3/wakame
          path: wakame_repo
          token: ${{ secrets.PAT }}

      - name: Sync selected files with rename
        run: |
          mkdir -p edu

          # 1. siteリポジトリからファイルをコピー (強制上書き)
          # パス: site_repo/tube/education/
          if [ -d "site_repo/tube/education" ]; then
            cp -f site_repo/tube/education/form.txt edu/edu.txt
            cp -f site_repo/tube/education/site.txt edu/ep.txt
            echo "Successfully synced from site repo."
          else
            echo "Error: Directory site_repo/tube/education not found."
            exit 1
          fi

          # 2. wakameリポジトリからJSONを抽出
          if [ -f "wakame_repo/video_config.json" ]; then
            jq -r '.params' wakame_repo/video_config.json > edu/parameter.txt
            echo "Successfully synced from wakame repo."
          else
            echo "Error: video_config.json not found."
            exit 1
          fi

      - name: Commit & Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 変更があるか確認するために、edu/ フォルダをステージング
          git add edu/
          
          if ! git diff --cached --quiet; then
            git commit -m "Sync: Updates from site and wakame repos"
            
            # リモートの最新（他のActionの実行結果など）を取り込んでからプッシュ
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes to sync."
          fi
